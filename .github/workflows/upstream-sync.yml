name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/Vexa-ai/vexa
          git fetch upstream
          git merge upstream/main --no-edit
          git push origin main
